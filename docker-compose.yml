services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: saturday_signal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saturday_signal"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - saturday_signal_postgres:/var/lib/postgresql/data

volumes:
  saturday_signal_postgres:
